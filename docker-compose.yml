version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: kb_qa_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: kb_qa
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kb_qa_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus依赖 - etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: kb_qa_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - kb_qa_network

  # Milvus依赖 - MinIO
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: kb_qa_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kb_qa_network

  # Milvus向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: kb_qa_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"
    networks:
      - kb_qa_network

  # Ollama向量模型服务
  ollama:
    image: ollama/ollama:latest
    container_name: kb_qa_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - kb_qa_network
    command: serve

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb_qa_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    environment:
      - DATABASE_URL=mysql://root:password@mysql:3306/kb_qa
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=all-minilm
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
      - DEEPSEEK_MODEL=deepseek-chat
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-this}
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - kb_qa_network
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kb_qa_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kb_qa_network
    restart: unless-stopped

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:
  ollama_data:
  backend_uploads:

networks:
  kb_qa_network:
    driver: bridge